<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="FoodPilot">
  <defs>
    <clipPath id="inner">
      <circle cx="128" cy="128" r="91"/>
    </clipPath>
  </defs>

  <!-- Compass N spike -->
  <polygon points="128,5 119,37 137,37" fill="#2BC4A0"/>
  <!-- Compass S spike -->
  <polygon points="128,251 119,219 137,219" fill="#2BC4A0"/>
  <!-- Compass E spike -->
  <polygon points="251,128 219,119 219,137" fill="#2BC4A0"/>
  <!-- Compass W spike -->
  <polygon points="5,128 37,119 37,137" fill="#2BC4A0"/>

  <!-- Main circle (white fill, teal ring) -->
  <circle cx="128" cy="128" r="89" fill="white" stroke="#2BC4A0" stroke-width="9"/>

  <!-- F — left vertical bar (navy) -->
  <rect x="58" y="56" width="32" height="144" rx="5" fill="#1B3A6B" clip-path="url(#inner)"/>
  <!-- F — top horizontal bar (navy) -->
  <rect x="58" y="56" width="96" height="34" rx="5" fill="#1B3A6B" clip-path="url(#inner)"/>
  <!-- F — top bar right section (teal, two-tone effect) -->
  <rect x="118" y="56" width="40" height="34" rx="4" fill="#2BC4A0" clip-path="url(#inner)"/>
  <!-- F — middle horizontal bar (navy) -->
  <rect x="58" y="108" width="68" height="28" rx="5" fill="#1B3A6B" clip-path="url(#inner)"/>

  <!-- Diagonal leaf (teal, lower-left → upper-right) -->
  <ellipse cx="130" cy="134" rx="74" ry="22"
           transform="rotate(-44 130 134)"
           fill="#2BC4A0" clip-path="url(#inner)"/>

  <!-- Center node dot (white with teal ring) -->
  <circle cx="128" cy="146" r="14" fill="white" stroke="#2BC4A0" stroke-width="5"/>
</svg>
